name: Feature request
description: Propose a new shape op, grammar addition, CLI flag, or other improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What can't you do today, or what's awkward? Concrete example sprites help.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like. For grammar/op changes, show the syntax you imagine.
      render: pix
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - grammar / language surface
        - shape ops
        - renderer
        - cli
        - lsp
        - docs
        - playground
    validations:
      required: true

  - type: checkboxes
    id: constraints
    attributes:
      label: Design constraints
      description: Pixel-DSL is deliberately small and deterministic. Please confirm your proposal fits.
      options:
        - label: Keeps output deterministic (same source → byte-identical PNG)
        - label: Keeps the grammar small enough to fit in an LLM system prompt
        - label: I've considered backward compatibility for existing `.pix` files

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, or how you work around this today.
    validations:
      required: false
