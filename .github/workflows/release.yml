name: Release

on:
  push:
    branches: [main]

# Only one release run at a time so the version PR / publish don't race.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the "Version Packages" PR branch + create tags/releases
      pull-requests: write # open/update the version PR
      id-token: write # npm Trusted Publishing (OIDC) — no long-lived token
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test run

      # When changesets are pending, this opens/updates a "Version Packages" PR
      # that bumps versions + writes changelogs. When that PR is merged (no
      # pending changesets), it runs `release` to build and publish to npm.
      # Configure each public package's Trusted Publisher on npm to point at
      # this repo + workflow (release.yml) before the first OIDC publish.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
