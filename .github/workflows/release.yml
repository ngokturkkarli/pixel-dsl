name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for npm Trusted Publishing (OIDC) — no long-lived token needed.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test run

      - name: Build
        run: pnpm -r build

      # Auth comes from GitHub's OIDC token, exchanged for a short-lived npm
      # token. Configure each package's Trusted Publisher on npm to point at
      # this repo + this workflow file (release.yml) before the first OIDC run.
      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
