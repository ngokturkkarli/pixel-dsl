name: Release

on:
  push:
    branches: [main]

# Only one release run at a time so the version PR / publish don't race.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing (OIDC) — no long-lived token
    steps:
      # Mint a short-lived token from the release GitHub App so the "Version
      # Packages" PR is authored by the App (not GITHUB_TOKEN). PRs opened with
      # GITHUB_TOKEN do not trigger workflows, so required checks (e.g. `build`)
      # would never run on them; an App token fixes that.
      # Requires repo secrets APP_ID and APP_PRIVATE_KEY (see the App with
      # Contents: read/write + Pull requests: read/write installed on this repo).
      - name: Generate release-bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test run

      # When changesets are pending, this opens/updates a "Version Packages" PR
      # that bumps versions + writes changelogs. When that PR is merged (no
      # pending changesets), it runs `release` to build and publish to npm.
      # Configure each public package's Trusted Publisher on npm to point at
      # this repo + workflow (release.yml) before the first OIDC publish.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
